<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Main brand gradient definition -->
  <defs>
    <linearGradient id="brandGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cubeFrontDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cubeSideDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cubeTopDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
    </linearGradient>
    <filter id="glowDark" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#1e293b"/>
  
  <!-- Compression arrows -->
  <g transform="translate(32, 32)" opacity="0.4">
    <path d="M-8 -18 L-8 -8" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
    <path d="M-8 -12 L-12 -8" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
    <path d="M-8 -12 L-4 -8" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
    <path d="M-8 8 L-8 18" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
    <path d="M-8 12 L-12 8" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
    <path d="M-8 12 L-4 8" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
    <path d="M-18 -8 L-8 -8" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
    <path d="M-12 -8 L-8 -12" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
    <path d="M-12 -8 L-8 -4" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
    <path d="M8 -8 L18 -8" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
    <path d="M12 -8 L8 -12" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
    <path d="M12 -8 L8 -4" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- 3D Isometric Cube -->
  <g transform="translate(32, 34)">
    <path d="M-12 0 L0 6 L12 0 L0 -6 Z" fill="url(#cubeFrontDark)" filter="url(#glowDark)"/>
    <path d="M12 0 L0 6 L0 16 L12 10 Z" fill="url(#cubeSideDark)"/>
    <path d="M0 -6 L0 6 L12 0 L0 -10 Z" fill="url(#cubeTopDark)"/>
    
    <!-- Compressed inner cube with brighter colors -->
    <g transform="translate(0, 8) scale(0.5)">
      <path d="M-12 0 L0 6 L12 0 L0 -6 Z" fill="#34d399" opacity="0.95"/>
      <path d="M12 0 L0 6 L0 16 L12 10 Z" fill="#10b981" opacity="0.95"/>
      <path d="M0 -6 L0 6 L12 0 L0 -10 Z" fill="#6ee7b7" opacity="0.95"/>
    </g>
  </g>
  
  <!-- Brand gradient border -->
  <rect x="2" y="2" width="60" height="60" rx="14" stroke="url(#brandGradientDark)" stroke-width="2" fill="none"/>
</svg>
